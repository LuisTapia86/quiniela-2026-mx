{% extends "base.html" %}
{% block title %}{{ t("title.reset_password") }} — {{ config.BRAND_NAME }}{% endblock %}
{% block content %}
<section class="card">
  <h1 class="card__title">{{ t("reset_pwd.heading") }}</h1>
  <p class="form__hint">{{ t("reset_pwd.intro") }}</p>
  <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" class="form" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label class="form__field">
      <span class="form__label">{{ t("form.password_new") }}</span>
      <input class="form__input" type="password" name="password" autocomplete="new-password" required minlength="8" aria-describedby="reset-pw-hint">
    </label>
    <label class="form__field">
      <span class="form__label">{{ t("form.password_confirm") }}</span>
      <input class="form__input" type="password" name="password_confirm" autocomplete="new-password" required minlength="8">
    </label>
    <p id="reset-pw-hint" class="form__hint">{{ t("reset_pwd.hint_min") }}</p>
    <button class="form__submit" type="submit">{{ t("reset_pwd.submit") }}</button>
  </form>
</section>
{% endblock %}
