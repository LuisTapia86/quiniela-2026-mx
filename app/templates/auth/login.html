{% extends "base.html" %}
{% block title %}Iniciar sesión — Quiniela Mundial 2026{% endblock %}
{% block content %}
<section class="card">
  <h1 class="card__title">Iniciar sesión</h1>
  <form method="post" action="{{ url_for('auth.login') }}" class="form" novalidate>
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <label class="form__field">
      <span class="form__label">Correo</span>
      <input class="form__input" type="email" name="email" autocomplete="email" required value="{{ email|e }}">
    </label>
    <label class="form__field">
      <span class="form__label">Contraseña</span>
      <input class="form__input" type="password" name="password" autocomplete="current-password" required>
    </label>
    <button class="form__submit" type="submit">Entrar</button>
  </form>
  <p class="card__footer">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate</a></p>
</section>
{% endblock %}
