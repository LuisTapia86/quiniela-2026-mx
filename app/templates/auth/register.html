{% extends "base.html" %}
{% block title %}{{ t("title.register") }} — {{ config.BRAND_NAME }}{% endblock %}
{% block content %}
<section class="card">
  <h1 class="card__title">{{ t("register.heading") }}</h1>
  <form method="post" action="{{ url_for('auth.register') }}" class="form" novalidate>
    <label class="form__field">
      <span class="form__label">{{ t("form.email") }}</span>
      <input class="form__input" type="email" name="email" autocomplete="email" required value="{{ email|e }}">
    </label>
    <label class="form__field">
      <span class="form__label">{{ t("form.password") }}</span>
      <input class="form__input" type="password" name="password" autocomplete="new-password" required minlength="6" aria-describedby="pw-hint">
    </label>
    <p id="pw-hint" class="form__hint">{{ t("form.password_min") }}</p>
    <button class="form__submit" type="submit">{{ t("form.submit.register") }}</button>
  </form>
  <p class="card__footer">{{ t("register.has_account") }} <a href="{{ url_for('auth.login') }}">{{ t("register.signin") }}</a></p>
</section>
{% endblock %}
