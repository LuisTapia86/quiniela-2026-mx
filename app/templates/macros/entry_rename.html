{% macro entry_rename(entry, form_action) %}
<span class="entry-rename-wrap">
  <button type="button" class="btn btn--sm entry-rename-open" data-entry-rename-open="entry-rename-{{ entry.id }}" aria-haspopup="dialog">Editar nombre</button>
</span>
<dialog id="entry-rename-{{ entry.id }}" class="admin-modal entry-rename-modal" aria-labelledby="entry-rename-title-{{ entry.id }}">
  <form method="post" action="{{ form_action }}" class="admin-modal__inner">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="next" value="{{ request.full_path }}">
    <h2 id="entry-rename-title-{{ entry.id }}" class="card__title card__title--sm">Editar nombre</h2>
    <label class="form__field">
      <span class="form__label">Nombre de la entrada:</span>
      <input class="form__input" type="text" name="name" minlength="3" maxlength="50" required autocomplete="off" value="{{ (entry.alias or '')|e }}">
    </label>
    <p class="form__hint">Entre 3 y 50 caracteres.</p>
    <div class="admin-modal__actions">
      <button type="button" class="btn" data-entry-rename-cancel>Cancelar</button>
      <button type="submit" class="btn btn--primary">Guardar</button>
    </div>
  </form>
</dialog>
{% endmacro %}
